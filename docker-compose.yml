services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: atendimentos
      POSTGRES_USER: SI
      POSTGRES_PASSWORD: SI@s3mur8
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    volumes:
      - .:/app
    command: bash -lc "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn app.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: "USI*s3mur81234"
      DJANGO_DEBUG: "1"
      DB_NAME: atendimentos
      DB_USER: SI
      DB_PASSWORD: SI@s3mur8
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1"
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
